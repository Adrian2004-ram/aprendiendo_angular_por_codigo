<div class="caption">
<h1>Categories @if (categoriesSearchResult.length > 0) { ({{categoriesSearchResult.length}}) }</h1>
<a (click)="showCategoryCreate = true">
    <svg
    width="24"
    height="24"
    xmlns="http://www.w3.org/2000/svg"
    fill-rule="evenodd"
    clip-rule="evenodd">
    <path d="M11.5 0c6.347 0 11.5 5.153 11.5 11.5s-5.153 11.5-11.5 11.5-11.5-5.153-11.5-11.5 5.153-11.5 11.5-11.5zm0 1c5.795 0 10.5 4.705 10.5 10.5s-4.705 10.5-10.5 10.5-10.5-4.705-10.5-10.5 4.705-10.5 10.5-10.5zm.5 10h6v1h-6v6h-1v-6h-6v-1h6v-6h1v6z"/>
    </svg>
</a>
</div>

<app-search-bar (termSearchBar)="onSearch($event)"></app-search-bar>

@if(showCategoryCreate) {
  <app-category-create (categoryCreated)="onCategoryCreated($event)"></app-category-create>
}


<ul class="pill-group">
@for( category of categoriesSearchResult; track category.id) {
  <li class="pill">
    <a>{{category.name}}</a>
  </li>
} @empty {
  <p>No categories found!</p>
}
</ul>
