<div class="header">
  <h1>Categorías ({{filteredCategories.length}})</h1>
  <button (click)="toggleCreateForm()">
    {{ showCreateForm ? 'Cancelar' : 'Nueva Categoría' }}
  </button>
</div>

<app-search-bar (search)="onSearch($event)" />

@if (showCreateForm) {
  <app-category-create (categoryCreated)="onCategoryCreated($event)" />
}

<ul class="category-list">
  @for (category of filteredCategories; track category.id) {
    <li>{{ category.name }}</li>
  } @empty {
    <p>No se han encontrado categorías.</p>
  }
</ul>
